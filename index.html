<script>
const term = document.getElementById('term');
const bannerTpl = document.getElementById('banner-tpl');

const PS1 = `<span class="ps1"><span class="user">kagancapar</span><span class="at">@</span><span class="host">io</span><span class="colon">:</span><span class="path">~</span><span class="dollar">$</span></span>`;

const HISTORY = [];
let histIdx = -1;

function el(html) {
  const d = document.createElement('div');
  d.innerHTML = html;
  return d.firstChild;
}

function print(html, cls='line out') {
  const div = document.createElement('div');
  div.className = cls;
  div.innerHTML = html;
  term.appendChild(div);
  scroll();
  return div;
}

function printRaw(node) {
  term.appendChild(node);
  scroll();
}

function scroll() {
  term.scrollTop = term.scrollHeight;
}

function showBanner() {
  printRaw(bannerTpl.content.cloneNode(true).firstChild);
}

const FILES = {
  'about.txt':
`Low-level offensive security. Reverse engineering Windows / Linux binaries,
hunting memory corruption bugs, writing position-independent shellcode,
turning crashes into exploit primitives.

Public CVEs in compression utilities (7-Zip) and image parsers (gdk-pixbuf).
Believer in PoC || GTFO.`,

  'cves.txt': null, // handled by cmd
  'shellcode.txt': null,
  'contact.txt': null,
  'README': `kagancapar.github.io
====================
type 'help' for available commands.
type 'ls' to see files.
type 'cat <file>' to read a file.`,
  '.bash_history': `whoami
cves
shellcode
cat /etc/shadow      # nope
sudo rm -rf /        # absolutely not
gdb -p $(pidof bash)`,
};

const CVES = [
  {
    id: 'CVE-2022-29072', stars: 673, lang: 'HTML',
    title: '7-Zip privilege escalation & command exec',
    desc: 'Drag a .7z file into Help>Contents on Windows -> SYSTEM. Patched in 21.07+.',
    url: 'https://github.com/kagancapar/CVE-2022-29072',
  },
  {
    id: 'CVE-2026-5201', stars: 11, lang: 'C',
    title: 'gdk-pixbuf JPEG heap-based buffer overflow',
    desc: 'CWE-122, CVSS 7.5. Triggered by a crafted JPEG via the gdk-pixbuf loader.',
    url: 'https://github.com/kagancapar/CVE-2026-5201',
  },
  {
    id: '7-Zip PoC', stars: 9, lang: '-',
    title: '7-Zip malicious code injection',
    desc: 'WinRAR-style infection PoC — believe it or not :)',
    url: 'https://github.com/kagancapar/7-zip-malicious-code-vulnerability',
  },
];

const SHELLCODE = [
  ['disable-aslr-security-shellcode',     'C',   'linux', 6, 'Disables ASLR on Linux at runtime'],
  ['linux-x64-reverse-tcp-shellcode',     'C',   'linux', 5, 'x86_64 Linux reverse TCP shellcode'],
  ['linux-enumeration-shellcode',         'C',   'linux', 5, 'Encrypted ELF shellcode wrapping linenum-style enumeration'],
  ['sudo-enumeration-shellcode',          'C',   'linux', 3, 'Checks running sudo against known public vulnerabilities'],
  ['windows-x86x64-persistence-shellcode','C',   'win',   7, 'Windows internals persistence — injects into arbitrary host process'],
  ['windows-x86x64-eventvwr-disable-shellcode','ASM','win',3,'Disables eventvwr-based logging surface on Windows x86/x64'],
];

const CONTACT = [
  ['github',     'github.com/kagancapar',     'https://github.com/kagancapar'],
  ['exploit-db', 'exploit-db.com/?author=9507','https://www.exploit-db.com/?author=9507'],
  ['twitter',    '@kagancapar',               'https://twitter.com/kagancapar'],
  ['linkedin',   '/in/kagancapar',            'https://www.linkedin.com/in/kagancapar/'],
];

const COMMANDS = {
  help: () => {
    print(`<span class="info">available commands</span>`);
    const rows = [
      ['help',          'show this list'],
      ['whoami / id',   'identity & role'],
      ['ls',            'list files in ~/'],
      ['cat <file>',    'read a file (about.txt, README, .bash_history)'],
      ['cves',          'public CVEs & disclosures'],
      ['shellcode',     'shellcode arsenal'],
      ['contact',       'how to reach me'],
      ['banner',        'reprint banner'],
      ['neofetch',      'system info'],

      ['exit',          'try it'],

    for (const [k,v] of rows) {
      html += `<div class="help-row"><span class="k">${k}</span><span class="dim">${v}</span></div>`;
    }
    print(html);
  },

  whoami: () => {
    print(`<span class="key">handle</span>  kagancapar`);
    print(`<span class="key">name</span>    Kağan Çapar`);
    print(`<span class="key">role</span>    Vulnerability Researcher`);
    print(`<span class="key">focus</span>   binary exploitation / shellcode dev`);
    print(`<span class="key">uid</span>     1337(kagancapar) <span class="dim">gid=1337(hackers) groups=27(sudo),0(root)</span>`);
  },
  id: () => COMMANDS.whoami(),

  ls: (args) => {
    const long = args.includes('-l') || args.includes('-la') || args.includes('-al');
    const files = [
      ['about.txt',     'f', 1247],
      ['cves.txt',      'x', 4096],
      ['shellcode.txt', 'x', 4096],
      ['contact.txt',   'x',  256],
      ['README',        'f',  118],
      ['.bash_history', 'f',   97],
    ];
    if (long) {
      let h = '';
      for (const [name, type, sz] of files) {
        const perm = type === 'x' ? '-rwxr-xr-x' : '-rw-r--r--';
        const cls  = type === 'x' ? 'x' : 'f';
        h += `<div class="line"><span class="dim">${perm} 1 kagan kagan ${String(sz).padStart(5)}</span> <span class="${cls}">${name}</span></div>`;
      }
      term.insertAdjacentHTML('beforeend', h);
    } else {
      let h = '<div class="ls-grid">';
      for (const [name,type] of files) {
        h += `<div class="${type}">${name}</div>`;
      }
      h += '</div>';
      term.insertAdjacentHTML('beforeend', h);
    }
    scroll();
  },

  cat: (args) => {
    const fn = args[0];
    if (!fn) { print(`<span class="err">cat: missing operand</span>`); return; }
    if (fn === '/etc/shadow' || fn === '/etc/passwd') {
      print(`<span class="err">cat: ${fn}: Permission denied</span>`);
      print(`<span class="dim">(nice try though)</span>`);
      return;
    }
    if (fn === 'cves.txt')      return COMMANDS.cves();
    if (fn === 'shellcode.txt') return COMMANDS.shellcode();
    if (fn === 'contact.txt')   return COMMANDS.contact();
    if (FILES[fn]) {
      print(FILES[fn].split('\n').map(escapeHtml).join('<br>'));
      return;
    }
    print(`<span class="err">cat: ${escapeHtml(fn)}: No such file or directory</span>`);
  },

  cves: () => {
    print(`<span class="info">// public disclosures</span>`);
    for (const c of CVES) {
      const t = `<div class="line">  <span class="cve">${c.id}</span> <span class="dim">[</span><span class="star">★ ${c.stars}</span><span class="dim">] [${c.lang}]</span></div>`;
      const d = `<div class="line">    <a href="${c.url}" target="_blank">${c.title}</a></div>`;
      const x = `<div class="line">    <span class="dim">${c.desc}</span></div>`;
      term.insertAdjacentHTML('beforeend', t+d+x+'<br>');
    }
    scroll();
  },
  disclosures: () => COMMANDS.cves(),

  shellcode: () => {
    print(`<span class="info">// shellcode arsenal</span>`);
    let h = '';
    for (const [name, lang, os, stars, desc] of SHELLCODE) {
      const url = `https://github.com/kagancapar/${name}`;
      h += `<div class="line">  <span class="dim">&gt;</span> <a href="${url}" target="_blank">${name}</a> <span class="dim">[</span><span class="key">${lang}</span><span class="dim">/</span><span class="ok">${os}</span><span class="dim">]</span> <span class="star">★${stars}</span></div>`;
      h += `<div class="line">    <span class="dim">${desc}</span></div>`;
    }
    term.insertAdjacentHTML('beforeend', h);
    scroll();
  },

  contact: () => {
    print(`<span class="info">// reach me</span>`);
    let h = '';
    for (const [k, v, url] of CONTACT) {
      h += `<div class="line">  <span class="key">${k.padEnd(10)}</span> <a href="${url}" target="_blank">${v}</a></div>`;
    }
    term.insertAdjacentHTML('beforeend', h);
    scroll();
  },

  banner: () => showBanner(),

  clear: () => { term.innerHTML = ''; },
  cls:   () => { term.innerHTML = ''; },

  date: () => print(new Date().toString()),

  neofetch: () => {
    const lines = [
      `<span class="cyan">    ___       </span> <span class="key">user</span>   : kagancapar`,
      `<span class="cyan">   /   \\___   </span> <span class="key">host</span>   : kagancapar.github.io`,
      `<span class="cyan">  / /\\  _ \\  </span> <span class="key">os</span>     : Phrack/2.6.x`,
      `<span class="cyan"> / /  \\/_/    </span> <span class="key">shell</span>  : /bin/bash 5.x`,
      `<span class="cyan"> \\ \\__/ \\    </span> <span class="key">term</span>   : xterm-256color`,
      `<span class="cyan">  \\___\\__/    </span> <span class="key">cves</span>   : 2 disclosed`,
      `              <span class="key">stars</span>  : 700+ across repos`,
      `              <span class="key">uptime</span> : since 2017-11-09`,
    ];
    for (const l of lines) print(l);
  },

  exit: () => print(`<span class="err">no escape from the matrix.</span>`),
  logout: () => COMMANDS.exit(),

  sudo: (args) => {
    if (args.join(' ').includes('rm')) {
      print(`<span class="err">[sudo] you really thought that would work?</span>`);
      return;
    }
    print(`<span class="dim">[sudo] password for kagancapar:</span>`);
    setTimeout(() => print(`<span class="err">Sorry, try again.</span>`), 400);
  },

  rm: () => print(`<span class="err">rm: refusing to remove '/' (use 'sudo rm -rf /' if you dare)</span>`),

  hack: () => {
    const seq = ['initiating exploit chain...', 'leaking heap address... 0x7f8e1c003a80',
      'ROP gadget search ............ 14 found',
      'pivot stack ............ ok',
      'shellcode staged @ rwx page',
      'ret2libc ... <span class="ok">success</span>',
      '<span class="cyan">just kidding. PoC || GTFO.</span>'];
    seq.forEach((l, i) => setTimeout(() => print(l), i * 250));
  },

  echo: (args) => print(escapeHtml(args.join(' '))),

  pwd: () => print('/home/kagancapar'),

  uname: () => print('Phrack 2.6.x #1337 SMP x86_64 GNU/Linux'),

  history: () => {
    HISTORY.forEach((h,i)=>print(`  ${String(i+1).padStart(3)}  ${escapeHtml(h)}`));
  },

  man: (args) => {
    if (args[0] === 'kagancapar') {
      print(`<span class="info">KAGANCAPAR(1)</span>     User Commands     <span class="info">KAGANCAPAR(1)</span>`);
      print('');
      print(`<span class="key">NAME</span>`);
      print(`       kagancapar - vulnerability researcher`);
      print('');
      print(`<span class="key">SYNOPSIS</span>`);
      print(`       kagancapar [--cves] [--shellcode] [--contact]`);
      print('');
      print(`<span class="key">DESCRIPTION</span>`);
      print(`       Hunts memory corruption bugs in Windows / Linux software.`);
      print(`       Writes position-independent shellcode. Discloses CVEs.`);
    } else {
      print(`<span class="err">No manual entry for ${args[0] || ''}</span>`);
    }
  },
};

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function execLine(raw) {
  // print echoed prompt + command
  const echo = document.createElement('div');
  echo.className = 'line';
  echo.innerHTML = `${PS1} <span class="cmd">${escapeHtml(raw)}</span>`;
  term.appendChild(echo);

  const trimmed = raw.trim();
  if (!trimmed) { newPrompt(); return; }
  HISTORY.push(trimmed);
  histIdx = HISTORY.length;

  const parts = trimmed.split(/\s+/);
  const cmd = parts[0].toLowerCase();
  const args = parts.slice(1);

  if (COMMANDS[cmd]) {
    COMMANDS[cmd](args);
  } else {
    print(`<span class="err">${escapeHtml(cmd)}: command not found</span> <span class="dim">(try 'help')</span>`);
  }
  newPrompt();
}

let activePrompt = null;
let buffer = '';

function newPrompt() {
  const row = document.createElement('div');
  row.className = 'prompt-line';
  row.innerHTML = `${PS1} <span class="typed"></span><span class="cursor"></span>`;
  term.appendChild(row);
  activePrompt = row;
  buffer = '';
  scroll();
}

function updateInput() {
  if (!activePrompt) return;
  activePrompt.querySelector('.typed').textContent = buffer;
}

document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'l') { e.preventDefault(); COMMANDS.clear(); newPrompt(); return; }
  if (e.ctrlKey && e.key === 'c') {
    e.preventDefault();
    if (activePrompt) {
      activePrompt.querySelector('.cursor').remove();
      activePrompt.insertAdjacentHTML('beforeend', '<span class="dim">^C</span>');
    }
    activePrompt = null;
    newPrompt();
    return;
  }
  if (!activePrompt) return;

  if (e.key === 'Enter') {
    const cmd = buffer;
    activePrompt.querySelector('.cursor').remove();
    activePrompt = null;
    execLine(cmd);
    return;
  }
  if (e.key === 'Backspace') {
    buffer = buffer.slice(0, -1);
    updateInput();
    return;
  }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (HISTORY.length === 0) return;
    histIdx = Math.max(0, histIdx - 1);
    buffer = HISTORY[histIdx] || '';
    updateInput();
    return;
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (HISTORY.length === 0) return;
    histIdx = Math.min(HISTORY.length, histIdx + 1);
    buffer = HISTORY[histIdx] || '';
    updateInput();
    return;
  }
  if (e.key === 'Tab') {
    e.preventDefault();
    const cmds = Object.keys(COMMANDS);
    const matches = cmds.filter(c => c.startsWith(buffer));
    if (matches.length === 1) { buffer = matches[0]; updateInput(); }
    else if (matches.length > 1) {
      print(matches.join('  '));
      const old = buffer; newPrompt(); buffer = old; updateInput();
    }
    return;
  }
  if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
    buffer += e.key;
    updateInput();
  }
});

document.addEventListener('click', () => {
  if (window.getSelection().toString()) return;
  // keep focus on document; we capture all keys globally
});

// === BOOT SEQUENCE ===
async function boot() {
  showBanner();
  print(`<span class="dim">Last login: ${new Date().toUTCString()} on tty1</span>`);
  print(`<span class="dim">type '<span class="info">help</span>' for commands · '<span class="info">ls</span>' for files · '<span class="info">cves</span>' for disclosures</span>`);
  print('');
  // auto-run whoami
  await sleep(250);
  await typeAndRun('whoami');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function typeAndRun(text) {
  newPrompt();
  for (const ch of text) {
    buffer += ch;
    updateInput();
    await sleep(40 + Math.random()*40);
  }
  await sleep(180);
  const cmd = buffer;
  activePrompt.querySelector('.cursor').remove();
  activePrompt = null;
  execLine(cmd);
}

boot();
</script>
