<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$kagancapar@io:~$ ==1337==ERROR: AddressSanitizer</title>
<style>
  :root {
    --bg: #0c0c0c;
    --fg: #cccccc;
    --dim: #888888;
    --gray: #666666;
    --white: #ffffff;
    --green: #4eda4e;
    --teal: #19c1c1;
    --cyan: #00ffff;
    --red: #f53535;
    --pink: #ff8fbf;
    --magenta: #d8168c;
    --amber: #d7c441;
    --orange: #d97a1a;
    --blue: #5b8af0;
    --link: #19c1c1;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: "Cascadia Mono", Consolas, "DejaVu Sans Mono", "Courier New", monospace;
    font-size: 13px;
    line-height: 1.38;
    height: 100vh;
    overflow: hidden;
  }
  body::before {
    content: "";
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg,
      rgba(0,0,0,0) 0, rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.13) 3px, rgba(0,0,0,0.13) 4px);
    pointer-events: none; z-index: 100;
  }
  body::after {
    content: "";
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.55) 100%);
    pointer-events: none; z-index: 99;
  }
  .scroll {
    height: 100vh;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 8px 14px;
    scrollbar-width: thin;
    scrollbar-color: #333 var(--bg);
  }
  .scroll::-webkit-scrollbar { width: 8px; }
  .scroll::-webkit-scrollbar-track { background: var(--bg); }
  .scroll::-webkit-scrollbar-thumb { background: #2a2a2a; }

  pre, .term { margin: 0; white-space: pre-wrap; word-break: keep-all; font-family: inherit; font-size: inherit; line-height: inherit; }
  .term > div { white-space: pre-wrap; }

  .user { color: var(--green); }
  .at   { color: var(--white); }
  .host { color: var(--green); }
  .path { color: var(--blue); font-weight: bold; }
  .dollar { color: var(--white); }
  .prompt { color: var(--green); }

  .err     { color: var(--red); font-weight: bold; }
  .summary-tag { color: var(--white); font-weight: bold; }
  .here    { color: var(--green); }
  .addr    { color: var(--amber); }
  .num     { color: var(--amber); }
  .src     { color: var(--blue); }
  .name    { color: var(--white); }
  .info    { color: var(--cyan); }
  .red     { color: var(--red); font-weight: bold; }
  .star    { color: var(--amber); }
  .com     { color: var(--gray); font-style: italic; }
  .lbl     { color: var(--cyan); }
  .val     { color: var(--green); }
  .frame-num { color: var(--gray); }
  .arrow { color: var(--green); font-weight: bold; }
  .equals { color: var(--green); font-weight: bold; }
  .typed { color: var(--green); }

  .sb-fa { color: var(--red); }
  .sb-00 { color: var(--green); }
  .sb-01 { color: var(--pink); font-weight: bold; }
  .sb-fd { color: var(--magenta); }
  .hl-byte {
    background: rgba(255, 143, 191, 0.18);
    padding: 0 2px;
  }

  a { color: var(--link); text-decoration: none; border-bottom: 1px dotted var(--link); }
  a:hover { background: var(--link); color: var(--bg); }

  .cursor {
    display: inline-block;
    width: 8px; height: 14px;
    background: var(--white);
    vertical-align: text-bottom;
    box-shadow: 0 0 6px var(--white);
    animation: bl 1s steps(2) infinite;
    margin-left: 1px;
  }
  @keyframes bl { 50% { opacity: 0; } }

  .help-row { display: grid; grid-template-columns: 110px 1fr; gap: 6px; }
  .help-row .k { color: var(--cyan); }

  ::selection { background: var(--green); color: var(--bg); }
</style>
</head>
<body>

<div class="scroll" id="scroll">
  <div class="term" id="term"></div>
</div>

<script>
const TERM = document.getElementById('term');
const SCROLL = document.getElementById('scroll');

const PS1_HTML =
  `<span class="user">kagancapar</span><span class="at">@</span><span class="host">io</span>:` +
  `<span class="path">~</span><span class="dollar">$</span>`;

const HISTORY = [];
let histIdx = -1;
let activePrompt = null;
let buffer = '';
let lockedInput = false;

const sleep = (ms) => new Promise(r => setTimeout(r, ms));
const esc = (s) => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const padR = (s, n) => String(s ?? '').padEnd(n).slice(0, n);
const padL = (s, n) => String(s ?? '').padStart(n).slice(0, n);

function append(html) {
  const d = document.createElement('div');
  d.innerHTML = html;
  TERM.appendChild(d);
  SCROLL.scrollTop = SCROLL.scrollHeight;
}

function appendBlock(html) {
  TERM.insertAdjacentHTML('beforeend', html);
  SCROLL.scrollTop = SCROLL.scrollHeight;
}

// ============ DATA ============
let liveDisclosures = null;
const STATIC_DISCLOSURES = [
  { name: 'CVE-2026-5201',  desc: 'gdk-pixbuf JPEG heap', stars: 11,  url: 'https://github.com/kagancapar/CVE-2026-5201' },
  { name: 'CVE-2022-29072', desc: '7-Zip privesc',        stars: 673, url: 'https://github.com/kagancapar/CVE-2022-29072' },
  { name: '7-Zip PoC',      desc: 'malicious code inj',   stars: 9,   url: 'https://github.com/kagancapar/7-zip-malicious-code-vulnerability' },
];

const SHELLCODE = [
  ['disable_aslr',          'C',   'lin', 6, 'https://github.com/kagancapar/disable-aslr-security-shellcode'],
  ['linux_x64_reverse_tcp', 'C',   'lin', 5, 'https://github.com/kagancapar/linux-x64-reverse-tcp-shellcode'],
  ['linux_enumeration',     'C',   'lin', 5, 'https://github.com/kagancapar/linux-enumeration-shellcode'],
  ['sudo_enumeration',      'C',   'lin', 3, 'https://github.com/kagancapar/sudo-enumeration-shellcode'],
  ['win_persistence',       'C',   'win', 7, 'https://github.com/kagancapar/windows-x86x64-persistence-shellcode'],
  ['win_eventvwr_disable',  'ASM', 'win', 3, 'https://github.com/kagancapar/windows-x86x64-eventvwr-disable-shellcode'],
];

const CONTACT = [
  ['github',     'github.com/kagancapar',       'https://github.com/kagancapar'],
  ['exploit-db', 'exploit-db.com/?author=9507', 'https://www.exploit-db.com/?author=9507'],
  ['twitter',    '@kagancapar',                 'https://twitter.com/kagancapar'],
  ['linkedin',   '/in/kagancapar',              'https://www.linkedin.com/in/kagancapar/'],
];

// ============ RENDERERS ============
function renderDisclosures(live) {
  const data = live || STATIC_DISCLOSURES;
  const liveTag = live ? ' <span class="com">[<span style="color:var(--green);">●</span> live]</span>' : '';
  let html = `<span class="info">// .disclosures published by thread T0:</span>${liveTag}\n`;
  data.forEach((c, i) => {
    const addr = '0x' + (0x401080 + i * 0x60).toString(16);
    html += `    <span class="frame-num">[${i}]</span> <span class="addr">${addr}</span>  ` +
            `<a href="${c.url}" target="_blank"><span class="red">${esc(padR(c.name, 14))}</span></a>  ` +
            `<span class="com">${esc(padR(c.desc, 21))}</span>  ` +
            `<span class="star">★ ${padL(c.stars, 3)}</span>\n`;
  });
  return html;
}

function renderShellcode() {
  let html = `<span class="info">// .shellcode arsenal staged @ rwx page:</span>\n`;
  for (let i = 0; i < SHELLCODE.length; i += 2) {
    const a = SHELLCODE[i], b = SHELLCODE[i+1];
    const left = `    <span class="frame-num">[${i}]</span> <a href="${a[4]}" target="_blank"><span class="name">${esc(padR(a[0], 21))}</span></a> <span class="com">${esc(padR('['+a[1]+'/'+a[2]+']', 9))}</span> <span class="star">★ ${a[3]}</span>`;
    const right = b ? `     <span class="frame-num">[${i+1}]</span> <a href="${b[4]}" target="_blank"><span class="name">${esc(padR(b[0], 20))}</span></a> <span class="com">${esc(padR('['+b[1]+'/'+b[2]+']', 9))}</span> <span class="star">★ ${b[3]}</span>` : '';
    html += left + right + '\n';
  }
  return html;
}

function renderContact() {
  let html = `<span class="info">// .got.plt - reachable references:</span>\n`;
  for (let i = 0; i < CONTACT.length; i += 2) {
    const a = CONTACT[i], b = CONTACT[i+1];
    const left  = `    <span class="lbl">${esc(padR(a[0], 10))}</span> <span class="arrow">→</span> <a href="${a[2]}" target="_blank"><span class="val">${esc(padR(a[1], 27))}</span></a>`;
    const right = b ? `  <span class="lbl">${esc(padR(b[0], 8))}</span> <span class="arrow">→</span> <a href="${b[2]}" target="_blank"><span class="val">${esc(b[1])}</span></a>` : '';
    html += left + right + '\n';
  }
  return html;
}

function renderShadow() {
  return (
`<span class="name">Shadow bytes around the buggy address:</span>
  <span class="addr">0x501fffffff80:</span>  <span class="sb-00">00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00</span>
  <span class="addr">0x502000000000:</span>  <span class="sb-fa">fa fa fa fa fa fa fa fa fa fa fa fa fa fa fa fa</span>
<span class="arrow">=&gt;</span><span class="addr">0x502000001330:</span>  <span class="sb-fa">fa fa fa fa fa fa</span><span class="hl-byte"><span class="sb-01">[01]</span></span><span class="sb-fa">fa fa fa fa fa fa fa fa fa</span>
  <span class="addr">0x502000001380:</span>  <span class="sb-fa">fa fa fa fa fa fa fa fa fa fa fa fa fa fa fa fa</span>

<span class="name">Shadow byte legend:</span> <span class="sb-00">00</span> addressable · <span class="sb-fa">fa</span> heap redzone · <span class="sb-01">01</span> partially addressable
`);
}

function renderBacktrace() {
  return (
`    <span class="frame-num">#0</span> <span class="addr">0x55e3a72c0042</span> in <span class="name">whoami</span>             <span class="src">io.cpp:42</span>
    <span class="frame-num">#1</span> <span class="addr">0x55e3a72c00f8</span> in <span class="name">main</span>               <span class="src">io.cpp:1337</span>
    <span class="frame-num">#2</span> <span class="addr">0x7ffff7c2dca8</span> in <span class="name">__libc_start_main</span>  <span class="src">csu/libc-start.c:360</span>
    <span class="frame-num">#3</span> <span class="addr">0x55e3a72bff64</span> in <span class="name">_start</span>             <span class="src">(io+0x2c344)</span>
`);
}

function renderHeader() {
  const cveCount = (liveDisclosures || STATIC_DISCLOSURES).length;
  return (
`<span class="src">io.cpp:1337:42:</span> <span class="err">runtime error:</span> identity overflow: <span class="num">1</span> researcher * <span class="num">${cveCount}</span> CVEs * <span class="num">6</span> shellcodes cannot be represented in type 'human'
<span class="equals">=================================================================</span>
<span class="equals">==1337==</span><span class="err">ERROR: AddressSanitizer: heap-buffer-overflow</span> on address <span class="addr">0x502000001337</span>
<span class="name">WRITE of size 65534</span> at <span class="addr">0x502000001337</span> thread <span class="cyan">T0</span> <span class="com">(kagancapar)</span>
    <span class="frame-num">#0</span> <span class="addr">0x55e3a72c0042</span> in <span class="name">whoami</span>  <span class="src">io.cpp:42</span>
    <span class="frame-num">#1</span> <span class="addr">0x55e3a72c00f8</span> in <span class="name">main</span>    <span class="src">io.cpp:1337</span>

<span class="addr">0x502000001337</span> <span class="here">is located 0 bytes after 1-byte region</span> <span class="com">[Kağan Çapar — Vulnerability Researcher]</span>
`);
}

function renderFooter() {
  return (
`<span class="summary-tag">SUMMARY:</span> AddressSanitizer: heap-buffer-overflow in <span class="name">__identity_dump</span> · PoC || GTFO
<span class="equals">==1337==</span><span class="err">ABORTING</span>
`);
}

function runCrash() {
  appendBlock(renderHeader());
  appendBlock(renderDisclosures(liveDisclosures));
  appendBlock('\n' + renderShellcode());
  appendBlock('\n' + renderShadow());
  appendBlock('\n' + renderContact());
  appendBlock('\n' + renderFooter());
}

async function runCrashAnimated() {
  // emit by line/section with small delays to feel like a real crash dump
  const blocks = [
    { html: renderHeader(),               delay: 90 },
    { html: renderDisclosures(liveDisclosures), delay: 70 },
    { html: '\n' + renderShellcode(),     delay: 70 },
    { html: '\n' + renderShadow(),        delay: 60 },
    { html: '\n' + renderContact(),       delay: 70 },
    { html: '\n' + renderFooter(),        delay: 100 },
  ];
  for (const b of blocks) {
    // print one line at a time inside the block
    const lines = b.html.split('\n');
    for (let i = 0; i < lines.length; i++) {
      const line = lines[i] + (i === lines.length - 1 ? '' : '\n');
      appendBlock(line);
      await sleep(b.delay);
    }
  }
}

// ============ COMMANDS ============
const COMMANDS = {
  help: () => {
    let h = '<span class="info">available commands</span>\n';
    const rows = [
      ['help',          'show this list'],
      ['crash / poc',   'rerun the heap-buffer-overflow PoC'],
      ['whoami / id',   'identity'],
      ['cves',          'disclosed vulnerabilities'],
      ['shellcode',     'shellcode arsenal'],
      ['contact',       '.got.plt entries'],
      ['bt',            'backtrace (stack frames)'],
      ['shadow',        'shadow byte map'],
      ['ls / cat',      'list / read files'],
      ['clear / cls',   'clear screen'],
      ['date / pwd',    'system info'],
      ['exit',          'try it'],
    ];
    for (const [k, v] of rows) {
      h += `<div class="help-row"><span class="k">${k}</span><span class="com">${v}</span></div>`;
    }
    appendBlock(h);
  },
  crash: () => runCrash(),
  poc:   () => runCrash(),
  run:   () => runCrash(),

  whoami: () => {
    appendBlock(
`<span class="lbl">handle</span>  kagancapar
<span class="lbl">name</span>    Kağan Çapar
<span class="lbl">role</span>    Vulnerability Researcher
<span class="lbl">focus</span>   binary exploitation / shellcode dev
<span class="lbl">uid</span>     1337(kagancapar) <span class="com">gid=1337(hackers) groups=27(sudo),0(root)</span>
`);
  },
  id: () => COMMANDS.whoami(),

  cves:        () => appendBlock(renderDisclosures(liveDisclosures)),
  disclosures: () => COMMANDS.cves(),
  shellcode:   () => appendBlock(renderShellcode()),
  arsenal:     () => COMMANDS.shellcode(),
  contact:     () => appendBlock(renderContact()),

  bt:        () => appendBlock(renderBacktrace()),
  backtrace: () => COMMANDS.bt(),
  shadow:    () => appendBlock(renderShadow()),
  dump:      () => COMMANDS.shadow(),

  ls: () => appendBlock(
    `<span class="cyan">crash.log</span>  <span class="cyan">identity</span>  <span class="cyan">cves</span>  ` +
    `<span class="cyan">shellcode</span>  <span class="cyan">contact</span>  <span class="white">README</span>  ` +
    `<span class="white">.bash_history</span>`),

  cat: (args) => {
    const f = args[0];
    if (!f) return append('<span class="err">cat: missing operand</span>');
    if (f === 'crash.log')  return runCrash();
    if (f === 'identity')   return COMMANDS.whoami();
    if (f === 'cves')       return COMMANDS.cves();
    if (f === 'shellcode')  return COMMANDS.shellcode();
    if (f === 'contact')    return COMMANDS.contact();
    if (f === 'README')     return appendBlock(
      `kagancapar.github.io\n` +
      `===================\n` +
      `Vulnerability researcher. Binary exploitation, shellcode, CVEs.\n` +
      `Type 'help' for commands. PoC || GTFO.`);
    if (f === '.bash_history') return appendBlock(
      `./poc --identify\nwhoami\ncves\nshellcode\nsudo rm -rf /\ngdb -p $(pidof bash)`);
    if (f === '/etc/shadow' || f === '/etc/passwd')
      return appendBlock(`<span class="err">cat: ${esc(f)}: Permission denied</span>\n<span class="com">(nice try though)</span>`);
    append(`<span class="err">cat: ${esc(f)}: No such file or directory</span>`);
  },

  clear: () => { TERM.innerHTML = ''; },
  cls:   () => COMMANDS.clear(),

  date:  () => append(new Date().toString()),
  pwd:   () => append('/home/kagancapar'),
  uname: () => append('Phrack 2.6.x #1337 SMP x86_64 GNU/Linux'),
  echo:  (args) => append(esc(args.join(' '))),

  history: () => HISTORY.forEach((h, i) => append(`  ${String(i+1).padStart(3)}  ${esc(h)}`)),

  exit:   () => append('<span class="err">no escape from the matrix.</span>'),
  logout: () => COMMANDS.exit(),

  sudo: (args) => {
    if (args.join(' ').includes('rm')) return append('<span class="err">[sudo] you really thought that would work?</span>');
    appendBlock('<span class="com">[sudo] password for kagancapar:</span>');
    setTimeout(() => append('<span class="err">Sorry, try again.</span>'), 400);
  },

  rm: () => append("<span class=\"err\">rm: refusing to remove '/' (use 'sudo rm -rf /' if you dare)</span>"),

  gdb: () => appendBlock(
    `GNU gdb (GDB) 13.2 — pwndbg loaded\n` +
    `<span class="com">Reading symbols from /home/kagancapar/.bin/io ... done.</span>\n` +
    `Attaching to process <span class="num">1337</span>\n` +
    `<span class="cyan">pwndbg></span> bt\n` +
    renderBacktrace()),
};

// ============ PROMPT / INPUT ============
function newPrompt() {
  const row = document.createElement('div');
  row.innerHTML = `${PS1_HTML} <span class="typed"></span><span class="cursor"></span>`;
  TERM.appendChild(row);
  activePrompt = row;
  buffer = '';
  lockedInput = false;
  SCROLL.scrollTop = SCROLL.scrollHeight;
}

function updateInput() {
  if (!activePrompt) return;
  activePrompt.querySelector('.typed').textContent = buffer;
}

function execLine(raw) {
  const trimmed = raw.trim();
  if (!trimmed) { newPrompt(); return; }
  HISTORY.push(trimmed);
  histIdx = HISTORY.length;
  const parts = trimmed.split(/\s+/);
  const cmd = parts[0].toLowerCase();
  const args = parts.slice(1);
  if (COMMANDS[cmd]) {
    COMMANDS[cmd](args);
  } else {
    append(`<span class="err">${esc(cmd)}: command not found</span> <span class="com">(try 'help')</span>`);
  }
  newPrompt();
}

document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'l') { e.preventDefault(); COMMANDS.clear(); newPrompt(); return; }
  if (e.ctrlKey && e.key === 'c') {
    e.preventDefault();
    if (activePrompt) {
      activePrompt.querySelector('.cursor')?.remove();
      activePrompt.insertAdjacentHTML('beforeend', '<span class="com">^C</span>');
    }
    activePrompt = null;
    newPrompt();
    return;
  }
  if (lockedInput || !activePrompt) return;

  if (e.key === 'Enter') {
    const cmd = buffer;
    activePrompt.querySelector('.cursor')?.remove();
    activePrompt = null;
    execLine(cmd);
    return;
  }
  if (e.key === 'Backspace') { buffer = buffer.slice(0, -1); updateInput(); return; }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (HISTORY.length === 0) return;
    histIdx = Math.max(0, histIdx - 1);
    buffer = HISTORY[histIdx] || '';
    updateInput();
    return;
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (HISTORY.length === 0) return;
    histIdx = Math.min(HISTORY.length, histIdx + 1);
    buffer = HISTORY[histIdx] || '';
    updateInput();
    return;
  }
  if (e.key === 'Tab') {
    e.preventDefault();
    const cmds = Object.keys(COMMANDS);
    const matches = cmds.filter(c => c.startsWith(buffer));
    if (matches.length === 1) { buffer = matches[0]; updateInput(); }
    else if (matches.length > 1) {
      append(matches.join('  '));
      const old = buffer; newPrompt(); buffer = old; updateInput();
    }
    return;
  }
  if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
    buffer += e.key;
    updateInput();
  }
});

// ============ LIVE FETCH ============
const OVERRIDES = {
  '7-zip-malicious-code-vulnerability': { name: '7-Zip PoC', desc: 'malicious code inj' },
  'CVE-2022-29072': { desc: '7-Zip privesc' },
  'CVE-2026-5201': { desc: 'gdk-pixbuf JPEG heap' },
};

async function fetchLive() {
  try {
    const res = await fetch('https://api.github.com/users/kagancapar/repos?per_page=100&sort=created&direction=desc');
    if (!res.ok) return;
    const repos = (await res.json()).filter(r => !r.fork);
    const matches = repos
      .filter(r => /^CVE-\d{4}-\d+$/i.test(r.name) || /vulnerability|^poc-|-poc$/i.test(r.name))
      .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    if (matches.length === 0) return;
    liveDisclosures = matches.map(r => {
      const ov = OVERRIDES[r.name] || {};
      return {
        name:  ov.name || r.name,
        desc:  ov.desc || (r.description || '').split(/[:\.]/)[0].trim(),
        stars: r.stargazers_count,
        url:   r.html_url,
      };
    });
  } catch (e) { /* keep static */ }
}

// ============ BOOT ============
async function typeCommand(text) {
  newPrompt();
  lockedInput = true;
  for (const ch of text) {
    buffer += ch;
    updateInput();
    await sleep(55 + Math.random() * 50);
  }
  await sleep(280);
  activePrompt.querySelector('.cursor')?.remove();
  activePrompt = null;
  HISTORY.push(text);
  histIdx = HISTORY.length;
}

(async () => {
  await fetchLive();
  await sleep(300);
  await typeCommand('./poc --identify');
  await sleep(150);
  await runCrashAnimated();
  await sleep(200);
  newPrompt();
})();
</script>
</body>
</html>
